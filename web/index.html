<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>myshell - Interactive Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>myshell</h1>
    <p>Interactive browser demo - by Matthew Amiadamen</p>
  </header>

  <div id="terminal-container">
    <div class="titlebar">
      <div class="dot r"></div>
      <div class="dot y"></div>
      <div class="dot g"></div>
      <span class="titlebar-text">myshell - /home/user</span>
    </div>
    <div id="terminal"></div>
  </div>

  <footer>
    Try:
    <span>dir</span> &nbsp;&bull;&nbsp;
    <span>cd projects</span> &nbsp;&bull;&nbsp;
    <span>echo hello world</span> &nbsp;&bull;&nbsp;
    <span>echo hi &gt; out.txt</span> &nbsp;&bull;&nbsp;
    <span>environ</span> &nbsp;&bull;&nbsp;
    <span>help</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="shell-demo.js"></script>
</body>
</html>
